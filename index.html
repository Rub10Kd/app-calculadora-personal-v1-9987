<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Calculadora</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
</head>
<body>
    <div class="calculator">
        <div class="top-bar-android">
            <span class="material-icons-mock">&#x2924;</span> 
            <span class="material-icons-mock active-icon">&#x3D;</span> 
            <span class="material-icons-mock">&#x229E;</span> 
            <span class="material-icons-mock">&#x2302;</span> 
            <span class="material-icons-mock">&#x22EE;</span> 
        </div>

        <div id="trigger-area" class="display-container">
            <div id="previous-display"></div>
            <div id="current-display">0</div>
        </div>

        <div class="divider"></div>

        <div class="buttons">
            <button class="btn btn-orange" onclick="clearAll()">C</button>
            <button class="btn btn-orange" onclick="deleteNumber()">&#x232B;</button>
            <button class="btn btn-orange" onclick="appendOperator('%')">%</button>
            <button class="btn btn-orange font-large" onclick="appendOperator('÷')">&divide;</button>
            
            <button class="btn btn-num" onclick="appendNumber(7)">7</button>
            <button class="btn btn-num" onclick="appendNumber(8)">8</button>
            <button class="btn btn-num" onclick="appendNumber(9)">9</button>
            <button class="btn btn-orange font-large" onclick="appendOperator('×')">&times;</button>
            
            <button class="btn btn-num" onclick="appendNumber(4)">4</button>
            <button class="btn btn-num" onclick="appendNumber(5)">5</button>
            <button class="btn btn-num" onclick="appendNumber(6)">6</button>
            <button class="btn btn-orange font-large" onclick="appendOperator('-')">&minus;</button>
            
            <button class="btn btn-num" onclick="appendNumber(1)">1</button>
            <button class="btn btn-num" onclick="appendNumber(2)">2</button>
            <button class="btn btn-num" onclick="appendNumber(3)">3</button>
            <button class="btn btn-orange font-large" onclick="appendOperator('+')">&plus;</button>
            
            <button class="btn btn-num font-small" onclick="toggleScientific()">&#x27F3;</button>
            <button class="btn btn-num" onclick="appendNumber(0)">0</button>
            <button class="btn btn-num font-large" onclick="appendNumber(',')">,</button>
            <button id="btn-equals" class="btn btn-equals" onclick="computeMagic()">=</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
